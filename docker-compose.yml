services:
  db:
    image: postgres:16-alpine
    container_name: proyectoce_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/bootstrap.sql:/docker-entrypoint-initdb.d/00_bootstrap.sql:ro
      - ./backend/database/creation_script.sql:/opt/db-scripts/creation_script.sql:ro
      - ./backend/database/population_script.sql:/opt/db-scripts/population_script.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proyectoce_app
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT}:8000"

  frontend:
    build:
      context: ./surgery-app
      dockerfile: Dockerfile
    container_name: proyectoce_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
